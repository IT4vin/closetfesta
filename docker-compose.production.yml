version: '3.8'

services:
  # ===============================
  # BACKEND API
  # ===============================
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: closetfesta-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      
      # Database
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB}
      - DB_USER=${POSTGRES_USER}
      - DB_PASS=${POSTGRES_PASSWORD}
      
      # Cache
      - CACHE_ENABLED=true
      - CACHE_HOST=redis
      - CACHE_PORT=6379
      - CACHE_PASSWORD=${REDIS_PASSWORD}
      
      # Security
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=1d
      - JWT_REFRESH_EXPIRES_IN=7d
      
      # Uploads
      - UPLOAD_MAX_SIZE=10485760
      - UPLOAD_PATH=/app/uploads
      
      # Logging
      - LOG_LEVEL=info
      - LOG_FILE_ENABLED=true
      - LOG_FILE_PATH=/app/logs
      
      # Rate Limiting
      - RATE_LIMIT_WINDOW=900000
      - RATE_LIMIT_MAX=100
      - RATE_LIMIT_AUTH_MAX=5
      
      # Email (configure conforme seu provedor)
      - EMAIL_ENABLED=true
      - EMAIL_HOST=${SMTP_HOST}
      - EMAIL_PORT=${SMTP_PORT}
      - EMAIL_USER=${SMTP_USER}
      - EMAIL_PASS=${SMTP_PASS}
      
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
      - ./data:/app/data
    
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    
    networks:
      - backend-network
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ===============================
  # POSTGRESQL DATABASE
  # ===============================
  postgres:
    image: postgres:15-alpine
    container_name: closetfesta-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
      
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      
    ports:
      - "5432:5432"
      
    networks:
      - backend-network
      
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
      
    # Configurações de performance
    command: >
      postgres
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c work_mem=4MB
      -c min_wal_size=1GB
      -c max_wal_size=4GB

  # ===============================
  # REDIS CACHE
  # ===============================
  redis:
    image: redis:7-alpine
    container_name: closetfesta-redis
    restart: unless-stopped
    command: >
      redis-server 
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256MB
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
      --appendfsync everysec
      
    ports:
      - "6379:6379"
      
    volumes:
      - redis_data:/data
      
    networks:
      - backend-network
      
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s

  # ===============================
  # NGINX REVERSE PROXY
  # ===============================
  nginx:
    image: nginx:alpine
    container_name: closetfesta-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./uploads:/var/www/uploads:ro
      
    depends_on:
      - api
      
    networks:
      - backend-network
      
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===============================
  # MONITORING (OPCIONAL)
  # ===============================
  prometheus:
    image: prom/prometheus:latest
    container_name: closetfesta-prometheus
    restart: unless-stopped
    profiles:
      - monitoring
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - backend-network

  grafana:
    image: grafana/grafana:latest
    container_name: closetfesta-grafana
    restart: unless-stopped
    profiles:
      - monitoring
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - backend-network

# ===============================
# VOLUMES
# ===============================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

# ===============================
# NETWORKS
# ===============================
networks:
  backend-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16 